# LocalFlow reference config. You normally never edit this file:
# the app creates and maintains config.toml itself (mirrors the menu,
# hot-reloaded). Copy a line into config.toml only to override it.

device_priority = []      # e.g. ["My USB Mic", "AirPods"]; empty = system default
samplerate = 16000
silence_rms = 0.01
mic_warn_after_s = 3.0
chunk_seconds = 8.0
chunk_min_silence_s = 0.3
max_recording_s = 300.0
warn_recording_s = 270.0
model = "large-v3-turbo"
compute_type = "int8"
cpu_threads = 8
beam_size = 1
asr_watchdog_s = 20.0
trigger_vk = 2            # the D key; combo below = Ctrl+Option+Cmd+D
trigger_mods = ["ctrl", "alt", "cmd"]
debounce_ms = 250
too_short_ms = 700
hold_cancel_ms = 600
spinner_gate_ms = 300
sounds = true
raw_by_default = false
llm_min_chars = 60
ollama_url = "http://127.0.0.1:11434"
ollama_model = "qwen2.5:3b"
ollama_timeout_s = 3.0
llm_enabled = false       # optional smart formatting; see README "Phase 2"
history_max_entries = 200
history_max_days = 30
debug_keys = false
